<!DOCTYPE html>
<html>
<title>Day Clock</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
<link id="css-theme" rel="stylesheet" href="https://www.w3schools.com/lib/w3-theme-blue-grey.css">
<style>
    .tooltip {position:absolute;bottom:18px;white-space:nowrap}
    .shadow {text-shadow:1px 1px 2px #444}
</style>
<script src="https://kit.fontawesome.com/777ce06865.js" crossorigin="anonymous"></script>

<body class="w3-dark-gray">
    <div id="alert" class="w3-panel w3-red w3-hide">
        <h3>Geolocation not found</h3>
        <p>Attention, this page requires geolocation to function. Either your browser is not allowing geolocation or another error occurred. Using Honolulu.</p>
    </div>
      
    <div class="w3-container w3-card-4 w3-theme w3-margin w3-round-large w3-padding">
        <div class="w3-row w3-section">
            <div id="daytime" class="w3-col w3-center w3-tooltip" style="width:50%"><i class="w3-xxlarge w3-text-amber fa-solid fa-sun shadow"></i><span class="w3-text w3-tag w3-theme w3-animate-opacity tooltip">Daytime elapsed: <span id="day-elapsed">100</span>%</span></div>
            <div class="w3-col w3-center w3-xlarge" style="width:0px">|</div>
            <div class="w3-rest w3-center w3-tooltip"><i class="w3-xxlarge w3-text-light-blue fa-solid fa-moon shadow"></i><span class="w3-text w3-tag w3-theme w3-animate-opacity tooltip">Nighttime elapsed: <span id="night-elapsed">100</span>%</span></div>
        </div>

        <div class="w3-row w3-section">
            <div class="w3-col w3-theme-l3 w3-round-xxlarge">
                <div id="day-bar" class="w3-theme-d5 w3-round-xxlarge w3-padding w3-xlarge w3-center" style="width:100%">Loading...</div>
            </div>
        </div>
    </div>
    <div class="w3-container w3-card-4 w3-theme w3-margin w3-round-large w3-padding">
        <h3 id="location"></h3>

        <!-- 
        <p class="w3-center">
            <button class="w3-btn w3-section w3-ripple w3-border w3-round-large" onclick="randomizeTheme()"> Colorize </button>
        </p>
         -->
    </div>

    <pre id="debug">
    </pre>

    <script>
        var latitude = 0;
        var longitude = 0;

        var daytimeElapsed = 0;
        var nighttimeElapsed = 0;
        var dayElapsed = 0;
        var dayPct = 50;

        var url = "";

        function setPosition(position) {
            latitude = 21.3099
            longitude = -157.8581
            if (position != null) {
                latitude = position.coords.latitude;
                longitude = position.coords.longitude;
            }
            console.log("latitude: " + latitude);
            console.log("latitude: " + longitude);

            loadData();
            setInterval(loadData,(1000*60*5));
        }

        function loadData() {
            const xhttp = new XMLHttpRequest();
            xhttp.onload = function() {
                const obj = JSON.parse(this.responseText);
                tempArray = ((String)(obj.astronomy.sunrise)).split(":")
                sunrise = parseFloat(tempArray[0]) + (parseFloat(tempArray[1]) / 60.0)
                tempArray = ((String)(obj.astronomy.sunset)).split(":")
                sunset = parseFloat(tempArray[0]) + (parseFloat(tempArray[1]) / 60.0)
                tempArray = ((String)(obj.astronomy.current_time)).split(":")
                currentTime = parseFloat(tempArray[0]) + (parseFloat(tempArray[1]) / 60.0)
                dayPct = Math.round(100.0 * (sunset - sunrise) / 24.0)
                dayElapsed = Math.round(100.0 * ((currentTime - sunrise) % 24.0) / 24.0)

                if (currentTime < sunset) {
                    nighttimeElapsed = 0;
                    daytimeElapsed = Math.round((currentTime-sunrise)/(sunset - sunrise) * 100);
                }
                else {
                    daytimeElapsed = 100;
                    nighttimeElapsed = Math.round((currentTime - sunset)/(24 - (sunset - sunrise)) * 100);
                }

                locale = []
                if (obj.location.locality) locale.push(obj.location.locality)
                if (obj.location.city) locale.push(obj.location.city)
                if (obj.location.state_prov) locale.push(obj.location.state_prov)
                if (obj.location.country_name) locale.push(obj.location.country_name)

                document.getElementById("daytime").style.width = dayPct + "%";
                document.getElementById("day-elapsed").innerText = daytimeElapsed;
                document.getElementById("night-elapsed").innerText = nighttimeElapsed;
    
                document.getElementById("day-bar").style.width = dayElapsed + "%";
                document.getElementById("day-bar").innerText = dayElapsed + "%";
                document.getElementById("location").innerText = locale.join(", ")

                // document.getElementById("debug").innerText = "sunrise: " + sunrise + "\nsunset: " + sunset + "\ncurrent_time: " + currentTime + "\nurl = " + url;
            };
            url = "https://api.ipgeolocation.io/v2/astronomy?apiKey=c59807d06852409ca1f5f803dcd16586&lat="+latitude+"&long="+longitude;

            xhttp.open("GET", url);
            xhttp.send();
        }

        function randomizeTheme() {
            var themes = ["w3-theme-red", "w3-theme-pink", "w3-theme-purple", "w3-theme-deep-purple", "w3-theme-indigo", "w3-theme-blue", "w3-theme-light-blue", "w3-theme-cyan", "w3-theme-teal", "w3-theme-green", "w3-theme-light-green", "w3-theme-lime", "w3-theme-khaki", "w3-theme-yellow", "w3-theme-amber", "w3-theme-orange", "w3-theme-deep-orange", "w3-theme-blue-grey", "w3-theme-brown", "w3-theme-grey", "w3-theme-dark-grey", "w3-theme-black"];
            document.getElementById("css-theme").setAttribute("href", "https://www.w3schools.com/lib/" + themes[Math.floor(Math.random() * themes.length)] + ".css");
        }

        function positionError (error) {
            document.getElementById("alert").classList.remove("w3-hide");
            setPosition()
        }

        if (navigator.geolocation) {
            console.log("geo location exists");
            navigator.geolocation.getCurrentPosition(setPosition, positionError);
            console.log("got current position");
        } else {
            document.getElementById("alert").classList.remove("w3-hide");
            setPosition()
        }

    </script>
</body>

</html>
